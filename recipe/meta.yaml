{% set name = "jax-finufft" %}
{% set version = "1.3.0rc1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jax-finufft/jax_finufft-{{ version }}.tar.gz
  sha256: fc75d4c771faf76094f20521b62a326da75e425841088148f8478112f6adc34e

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  skip: true  # [win or py<311 or (osx and x86_64)]
  script_env:
    # Turn off "-march=native"
    - SKBUILD_CMAKE_DEFINE=\"FINUFFT_ARCH_FLAGS=\"                                                       # [cuda_compiler_version == "None"]
    - SKBUILD_CMAKE_DEFINE=\"JAX_FINUFFT_USE_CUDA=ON;CMAKE_CUDA_ARCHITECTURES=all-major;FINUFFT_ARCH_FLAGS=\"  # [cuda_compiler_version != "None"]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version != "None"]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version == "None"]

requirements:
  build:
    - python                                    # [build_platform != target_platform]
    - cross-python_{{ target_platform }}        # [build_platform != target_platform]
    - scikit-build-core                         # [build_platform != target_platform]
    - setuptools_scm                            # [build_platform != target_platform]
    - nanobind                                  # [build_platform != target_platform]
    - {{ compiler('cuda') }}                    # [cuda_compiler_version != "None"]
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - jax >=0.5.0
  host:
    - nccl                                      # [cuda_compiler_version != "None"]
    - cuda-cupti-dev                            # [cuda_compiler_version != "None"]
    - cuda-cudart-dev                           # [cuda_compiler_version != "None"]
    - cuda-nvml-dev                             # [cuda_compiler_version != "None"]
    - cuda-nvtx-dev                             # [cuda_compiler_version != "None"]
    - libcufft-dev                              # [cuda_compiler_version != "None"]
    - libcufft-static                           # [cuda_compiler_version != "None"]
    - cuda-version {{ cuda_compiler_version }}  # [cuda_compiler_version != "None"]
    - python
    - scikit-build-core
    - setuptools_scm
    - nanobind
    - pip
    - fftw
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - jax >=0.5.0
  run:
    - python
    - jax >=0.5.0
    - pydantic >=2

test:
  imports:
    - jax_finufft
    - jax_finufft.jax_finufft_cpu
    - jax_finufft.jax_finufft_gpu  # [cuda_compiler_version != "None"]
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/flatironinstitute/jax-finufft
  license: Apache-2.0
  license_file:
    - LICENSE
    - vendor/finufft/LICENSE
  summary: JAX bindings to the Flatiron Institute Non-uniform Fast Fourier Transform library
  dev_url: https://github.com/flatironinstitute/jax-finufft

extra:
  recipe-maintainers:
    - dfm
    - lgarrison
